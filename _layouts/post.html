---
layout: default
---
<article>
  <h1>{{ page.title }}</h1>
  <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y-%m-%d" }}</time>
  {% for tag in page.tags %}<a class="tag" href="{{ site.baseurl }}/tags/{{ tag | slugify }}/">#{{ tag }}</a> {% endfor %}
  {{ content }}
</article>
